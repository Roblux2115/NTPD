version: "3.8"

services:
  api:
    build: .
    container_name: student-api-compose
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - ml-network

  redis:
    image: redis:alpine
    container_name: redis-service
    ports:
      - "6379:6379"
    networks:
      - ml-network

networks:
  ml-network:
    driver: bridge